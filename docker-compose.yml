services:
  opexai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opexai-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - DATABASE_PATH=/app/backend/data/opex.db
    volumes:
      - opexai-data:/app/backend/data
      - opexai-uploads:/app/backend/uploads
    networks:
      - opexai-net

volumes:
  opexai-data:
    driver: local
  opexai-uploads:
    driver: local

networks:
  opexai-net:
    driver: bridge
